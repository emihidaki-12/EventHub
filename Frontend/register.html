<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventHub | Register</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="auth-wrapper">

    <div class="auth-card">

      <!-- LOGO -->
      <img src="images/logo.png" alt="EventHub Logo" class="auth-logo">

      <h1>Register</h1>

      <!-- REGISTER FORM -->
      <form id="registerForm">

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullname" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Create a password" required>
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
        </div>

        <!-- ROLE SELECT — "admin" removed; admin accounts are seeded directly in the DB -->
        <div class="form-group">
          <label>Account Type</label>
          <select id="role" required>
            <option value="">Select account type</option>
            <option value="user">Regular User</option>
            <option value="host">Host</option>
          </select>
        </div>

        <button type="submit" class="form-submit">Register</button>

      </form>

      <!-- MESSAGE -->
      <p id="message" class="auth-text"></p>

      <!-- LINK -->
      <p class="auth-text">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

    </div>

  </div>

  <!-- SCRIPT -->
  <script>
    const form = document.getElementById("registerForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const fullname = document.getElementById("fullname").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const role = document.getElementById("role").value;

      try {
        const res = await fetch("/api/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            fullname,
            email,
            password,
            confirmPassword,
            role
          })
        });

        const data = await res.json();

        if (res.ok) {
          message.style.color = "green";
          message.textContent = "Registration successful! Redirecting...";

          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);
        } else {
          message.style.color = "red";
          message.textContent = data.message;
        }

      } catch (err) {
        message.style.color = "red";
        message.textContent = "Server error. Try again.";
      }
    });
  </script>

</body>
</html>
