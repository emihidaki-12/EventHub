<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EventHub | Login</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <img src="images/logo.png" alt="EventHub Logo" class="auth-logo">

      <h1>Login</h1>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="form-submit">Login</button>
      </form>

      <p id="message" class="auth-text"></p>

      <p class="auth-text">
        Don’t have an account?
        <a href="register.html">Sign up</a>
      </p>

    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("http://10.0.131.199:5050/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            password
          })
        });

        const data = await res.json();

        if (res.ok) {
          message.style.color = "green";
          message.textContent = "Login successful! Redirecting...";

          localStorage.setItem("eventhubUser", JSON.stringify(data.user));

          setTimeout(() => {
            if (data.user.role === "admin") {
              window.location.href = "admin.html";
            } else if (data.user.role === "host") {
              window.location.href = "host.html";
            } else {
              window.location.href = "home.html";
            }
          }, 1500);
        } else {
          message.style.color = "red";
          message.textContent = data.message;
        }

      } catch (err) {
        message.style.color = "red";
        message.textContent = "Server error. Try again.";
      }
    });
  </script>

</body>
</html>
